# PLAINTEXT TEMPLATE — fill in values then encrypt:
#   sops -e -i secrets/secrets.yaml
#
# Generation commands (run once, store results here):
#   openssl rand -hex 32          → for most secrets (hex avoids / and + in URL strings)
#   openssl genrsa 4096 2>/dev/null | openssl pkcs8 -topk8 -nocrypt  → mas_signing_key
#
# WARNING: Do NOT commit this file without encrypting first.
# After filling in values, run: sops -e -i secrets/secrets.yaml
# Then commit the encrypted version. The plaintext is safe to store locally but not in git.

matrix:
    # openssl rand -hex 32  (hex only — avoids URL-encoding issues in psql connection strings)
    postgres_password: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32  (MAS expects exactly 64 hex chars = 32 bytes)
    mas_secret_key: REPLACE_WITH_HEX_SECRET

    # openssl genrsa 4096 2>/dev/null | openssl pkcs8 -topk8 -nocrypt
    # Paste the entire PEM block including BEGIN/END lines
    mas_signing_key: |
        -----BEGIN PRIVATE KEY-----
        REPLACE_WITH_RSA_4096_PKCS8_PEM
        -----END PRIVATE KEY-----

    # openssl rand -hex 32
    synapse_shared_secret: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32
    synapse_client_secret: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32  (separate from synapse_client_secret — used for admin MSC3861)
    synapse_admin_token: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32
    livekit_secret: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32  (Grafana DB encryption key — required since NixOS 26.05)
    grafana_secret_key: REPLACE_WITH_HEX_SECRET

authelia:
    # openssl rand -hex 32
    jwt_secret: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32
    session_secret: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32
    storage_encryption_key: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32  (shared secret between Authelia OIDC and MAS upstream provider)
    oidc_client_secret: REPLACE_WITH_HEX_SECRET

bridges:
    # openssl rand -hex 32
    doublepuppet_as_token: REPLACE_WITH_HEX_SECRET

    # openssl rand -hex 32
    doublepuppet_hs_token: REPLACE_WITH_HEX_SECRET

    # From https://my.telegram.org → API development tools
    telegram_api_id: "REPLACE_WITH_NUMERIC_API_ID"
    telegram_api_hash: REPLACE_WITH_API_HASH

    # Bridge DB users use Unix socket peer auth — no passwords needed.
    # (OS user mautrix-telegram = PG user mautrix-telegram, etc.)
