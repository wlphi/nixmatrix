# nixMatrix behind nginx
# -----------------------
# For use with `nixmatrix.externalProxy.enable = true;` (Caddy serves plain HTTP
# on 127.0.0.1:8080 and nginx terminates TLS).
#
# 1. Replace example.com with your domain.
# 2. Point ssl_certificate / ssl_certificate_key at your certs (e.g. a wildcard
#    *.example.com cert + the apex). certbot --nginx can fill these in.
# 3. Reload nginx.
#
# The Host / X-Forwarded-* headers below are required — the auth service builds
# its login redirect URLs from them, and login breaks without them.

# Redirect all HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name example.com *.example.com;
    return 301 https://$host$request_uri;
}

# One HTTPS block covers the apex and every Matrix subdomain.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name example.com *.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Matrix media uploads default to 100M; keep these in step.
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;

        # Required: pass the original host and tell the backend it's HTTPS.
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP         $remote_addr;

        # WebSockets (Element Call signalling, live sync).
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $http_connection;

        proxy_read_timeout 3600s;
    }
}

# nginx needs this map for the Connection header to support WebSocket upgrades.
# Put it in the http { } context (e.g. conf.d/), not inside a server block:
#
# map $http_upgrade $http_connection {
#     default upgrade;
#     ''      close;
# }
