# nixMatrix behind Apache httpd 2.4+
# ----------------------------------
# For use with `nixmatrix.externalProxy.enable = true;` (Caddy serves plain HTTP
# on 127.0.0.1:8080 and Apache terminates TLS).
#
# 1. Enable the needed modules:
#      a2enmod ssl proxy proxy_http proxy_wstunnel headers rewrite
# 2. Replace example.com with your domain and set the certificate paths
#    (certbot --apache can fill these in).
# 3. Reload Apache.
#
# The Host / X-Forwarded-* headers below are required — the auth service builds
# its login redirect URLs from them, and login breaks without them.

# Redirect all HTTP to HTTPS.
<VirtualHost *:80>
    ServerName example.com
    ServerAlias *.example.com
    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# One HTTPS block covers the apex and every Matrix subdomain.
<VirtualHost *:443>
    ServerName example.com
    ServerAlias *.example.com

    SSLEngine on
    SSLCertificateFile    /etc/letsencrypt/live/example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/example.com/privkey.pem

    # Preserve the original host; ProxyPreserveHost passes it to the backend.
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "%{HTTP_HOST}s"

    # WebSocket upgrade (Element Call signalling, live sync): route Upgrade
    # requests through ws://, everything else through http://.
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule ^/?(.*) ws://127.0.0.1:8080/$1 [P,L]

    ProxyPass        / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # Matrix media uploads default to 100M.
    LimitRequestBody 104857600
</VirtualHost>
